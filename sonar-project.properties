# SonarQube analysis config for Student Hub.
# Host URL and login token are injected by Jenkins (withSonarQubeEnv 'MySonarQube').

sonar.projectKey=student-hub
sonar.projectName=Student Hub
sonar.projectVersion=1.0

# Source code to analyse (app code only)
sonar.sources=backend/app,frontend/app,frontend/components,frontend/hooks,frontend/lib

# Generated / vendored code excluded from analysis
sonar.exclusions=**/node_modules/**,**/.next/**,**/venv/**,**/components/ui/**

sonar.python.version=3.11
sonar.sourceEncoding=UTF-8
