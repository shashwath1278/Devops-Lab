# Azure DevOps pipeline — Student Hub
# Triggered by commits to main; runs on self-hosted agent 'shrutijr' in pool 'shruti'.
#
# NOTE: the original spec said "npm install/test in the backend directory", but backend/ is
# Python/FastAPI (no package.json). The Node.js project is frontend/, so the build/test steps
# target frontend/ with a supported Node version. Swap workingDirectory back to 'backend' and
# versionSpec to '14.x' only if the examiner requires the file to match her template literally.

trigger:
  branches:
    include:
      - main

pool:
  name: 'shashwath'
  demands:
    - Agent.Name -equals shashwath

steps:
  - checkout: self

  - task: NodeTool@0
    displayName: 'Install Node.js 20'
    inputs:
      versionSpec: '20.x'

  - script: |
      npm install
      npm test
    displayName: 'npm install & npm test'
    workingDirectory: 'frontend'
